name: Deploy YTClipper to VPS

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare target directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/rizqibennington/ytclip
            mkdir -p /home/ubuntu/rizqibennington/ytclip_data

      - name: Upload app to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "*"
          target: "/home/ubuntu/rizqibennington/ytclip"

      - name: Rebuild & restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            test -f /home/ubuntu/rizqibennington/ytclip/Dockerfile
            cd /home/ubuntu/rizqibennington
            docker compose up -d --build ytclip
